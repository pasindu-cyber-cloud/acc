# =============================================================================
# Risk profiles. Each profile overrides scoring thresholds, growth-rate caps,
# and safeguard limits. Profiles NEVER disable core risk controls.
# =============================================================================

conservative:
  description: "Capital-protection first. Low growth, strict readiness."
  ready_threshold: 78
  min_ready_persistence_ticks: 25
  max_growth_rate: 0.02
  stability_floor: 70          # min Accumulator Stability Score to be READY
  jump_safety_floor: 75
  allow_high_vol_families: false
  preferred_families: ["R_10", "R_25", "1HZ10V", "1HZ25V"]
  safeguards:
    max_daily_loss: 20.0
    max_trades_per_hour: 4
    max_trades_per_day: 12
    cooldown_after_loss_sec: 300
    min_ready_dwell_sec: 20
    max_concurrent_trades: 1

moderate:
  description: "Balanced. Moderate growth, still vetoes jump expansion."
  ready_threshold: 72
  min_ready_persistence_ticks: 15
  max_growth_rate: 0.03
  stability_floor: 60
  jump_safety_floor: 65
  allow_high_vol_families: false
  preferred_families: ["R_10", "R_25", "R_50", "1HZ10V", "1HZ25V", "1HZ50V"]
  safeguards:
    max_daily_loss: 50.0
    max_trades_per_hour: 8
    max_trades_per_day: 30
    cooldown_after_loss_sec: 120
    min_ready_dwell_sec: 12
    max_concurrent_trades: 2

aggressive:
  description: "Higher growth permitted, but only on strong score + low deterioration."
  ready_threshold: 68
  min_ready_persistence_ticks: 10
  max_growth_rate: 0.05
  stability_floor: 55
  jump_safety_floor: 60
  allow_high_vol_families: true
  preferred_families: ["R_10", "R_25", "R_50", "R_75", "R_100", "1HZ100V"]
  safeguards:
    max_daily_loss: 100.0
    max_trades_per_hour: 15
    max_trades_per_day: 60
    cooldown_after_loss_sec: 60
    min_ready_dwell_sec: 8
    max_concurrent_trades: 3
